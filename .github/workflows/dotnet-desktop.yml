name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: Photo2GoAPI.sln
  BACKEND_PROJECT_PATH: backend/Photo2GoAPI/Photo2GoAPI.csproj
  FRONTEND_PATH: frontend

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Build backend
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ${{ env.FRONTEND_PATH }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.FRONTEND_PATH }}

  test:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Test backend
        run: dotnet test ${{ env.SOLUTION_NAME }} --configuration Release --no-restore --verbosity normal

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ${{ env.FRONTEND_PATH }}

      - name: Lint frontend
        run: npm run lint
        working-directory: ${{ env.FRONTEND_PATH }}
