name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_NAME: Photo2GoAPI.sln

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Build backend
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

  test:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Test backend
        run: dotnet test ${{ env.SOLUTION_NAME }} --configuration Release --no-restore --verbosity normal
